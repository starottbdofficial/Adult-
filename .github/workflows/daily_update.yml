name: Daily Playlist Update

on:
  schedule:
    - cron: '0 0 * * *'  # প্রতিদিন রাত ১২টায় রান হবে
  workflow_dispatch:      # ম্যানুয়ালি রান করার বাটন

permissions:
  contents: write  # GitHub-এ রাইট পারমিশন নিশ্চিত করা হলো

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # ফাইল পরিবর্তন চেক করা
          if [ -n "$(git status --porcelain)" ]; then
            git add playlist.m3u
            git commit -m "Auto-update playlist: $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "কোনো পরিবর্তন নেই, আপডেট করার প্রয়োজন নেই।"
          fi
